<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
    <body class="bg-slate-900 p-10">
  <div id="output" class="max-w-md mx-auto">
    </div>
</body>
<script>
   async function fetchPost(url) {
  const output = document.getElementById('output');
  
  try {
    const response = await fetch(url)

    if (!response.ok) {
      displayError(`Error ${response.status}: Post not found!`)
      return
    }

    const data = await response.json()
    output.innerHTML = `<div class="p-4 bg-green-100 text-green-800 rounded">Success: ${data.title}</div>`

  } catch (error) {
    displayError("Network Error: The URL is invalid or the server is down.")
  }
}

function displayError(message) {
  const output = document.getElementById('output')
  output.innerHTML = `<div class="p-4 bg-red-100 text-red-700 border border-red-400 rounded-md font-medium"> ⚠️ ${message} </div>`
}

fetchPost("https://jsonplaceholder.typicode.com/posts/9999");
</script>
</html>
