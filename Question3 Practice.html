<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
    <body class="bg-slate-900 p-10">
  <div id="output" class="max-w-md mx-auto">
    </div>
</body>
<script>
   async function fetchPost(url) {
  const output = document.getElementById('output');
  
  try {
    const response = await fetch(url);

    // STEP 1: Check response.ok (Handles 404, 500, etc.)
    // response.ok is true if the status is between 200-299
    if (!response.ok) {
      displayError(`Error ${response.status}: Post not found!`);
      return; // Stop the function here
    }

    const data = await response.json();
    output.innerHTML = `<div class="p-4 bg-green-100 text-green-800 rounded">Success: ${data.title}</div>`;

  } catch (error) {
    // STEP 2: The catch block (Handles network failure/broken URLs)
    displayError("Network Error: The URL is invalid or the server is down.");
  }
}

// Helper function to create the red Tailwind error UI
function displayError(message) {
  const output = document.getElementById('output');
  output.innerHTML = `
    <div class="p-4 bg-red-100 text-red-700 border border-red-400 rounded-md font-medium">
      ⚠️ ${message}
    </div>
  `;
}

// --- TEST SCENARIOS ---

// Scenario A: ID does not exist (Triggers !response.ok)
fetchPost("https://jsonplaceholder.typicode.com/posts/9999");

// Scenario B: Completely broken URL (Triggers the catch block)
// Uncomment the line below to see the network catch in action:
// fetchPost("https://this-is-a-totally-fake-url-123.com");
</script>
</html>
